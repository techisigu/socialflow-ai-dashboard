apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: socialflow-dev

resources:
  - ../../base
  - limitrange.yaml
  - resourcequota.yaml

patches:
  # 1 replica, relaxed resources for dev
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: socialflow-backend
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: backend
                resources:
                  requests:
                    cpu: 100m
                    memory: 128Mi
                  limits:
                    cpu: 250m
                    memory: 256Mi
  # HPA: 1–3 replicas in dev
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: socialflow-backend
      spec:
        minReplicas: 1
        maxReplicas: 3
  # Dev hostname + TLS via staging issuer (avoids Let's Encrypt rate limits)
  - patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: socialflow-backend
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-staging
      spec:
        rules:
          - host: api.dev.socialflow.example.com
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: socialflow-backend
                      port:
                        name: http
        tls:
          - hosts:
              - api.dev.socialflow.example.com
            secretName: socialflow-dev-tls

configMapGenerator:
  - name: socialflow-config
    behavior: merge
    literals:
      - NODE_ENV=development
      - LOG_LEVEL=debug
