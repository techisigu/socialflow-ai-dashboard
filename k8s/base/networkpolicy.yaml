apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: socialflow-backend
spec:
  podSelector:
    matchLabels:
      app: socialflow-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic only from the ingress-nginx controller namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3001
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
    # Redis
    - ports:
        - protocol: TCP
          port: 6379
    # PostgreSQL
    - ports:
        - protocol: TCP
          port: 5432
